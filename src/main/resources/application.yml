spring:
  application:
    name: taskmanager
  profiles:
    active: dev

  #H2 Db Configuration
  datasource:
    url: jdbc:h2:mem:taskdb
    driverClassName: org.h2.Driver
    username: sa
    password: password
  h2:
    console:
      enabled: true
      path: /h2-console

  #JPA Configuration
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
        ddl-auto: update
    show-sql: true

#actuator configuration
management:
    endpoints:
        web:
            exposure:
                include: health,info,metrics,env,logger,beans,mappings
            base-path: /actuator
    endppoints:
        health:
            show-details: always

    info:
      env:
        enabled: true

info:
  app:
    description: A simple task management application built with Spring Boot.
    version: 1.0.0
    author: Leet Journey

# Custom application properties
app:
  name: Task Manager
  version: 1.0.0
  max-tasks-per-page: 10